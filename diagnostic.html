<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Firebase Diagnostic Tool - Samartha Craft Studio</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      padding: 30px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .test-section {
      margin-bottom: 25px;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }
    .test-title {
      font-weight: 600;
      color: #333;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .result {
      padding: 12px;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 14px;
      font-family: 'Courier New', monospace;
    }
    .success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    .info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    .warning {
      background: #fff3cd;
      color: #856404;
      border: 1px solid #ffeaa7;
    }
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s;
      margin-right: 10px;
      margin-bottom: 10px;
    }
    button:hover {
      background: #5568d3;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    button:active {
      transform: translateY(0);
    }
    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-left: 10px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .code {
      background: #2d2d2d;
      color: #f8f8f2;
      padding: 15px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 13px;
      margin-top: 10px;
    }
    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      margin-left: 8px;
    }
    .badge-success { background: #28a745; color: white; }
    .badge-error { background: #dc3545; color: white; }
    .badge-warning { background: #ffc107; color: #333; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔍 Firebase Diagnostic Tool</h1>
    <p class="subtitle">Samartha Craft Studio - Hostinger Deployment Checker</p>

    <!-- Test 1: Firebase Config -->
    <div class="test-section">
      <div class="test-title">1. Firebase Configuration Check</div>
      <button onclick="testFirebaseConfig()">Run Test</button>
      <div id="config-result"></div>
    </div>

    <!-- Test 2: Firestore Connection -->
    <div class="test-section">
      <div class="test-title">2. Firestore Connection Test</div>
      <button onclick="testFirestoreConnection()">Run Test</button>
      <div id="firestore-result"></div>
    </div>

    <!-- Test 3: Write Permission -->
    <div class="test-section">
      <div class="test-title">3. Firestore Write Permission Test</div>
      <button onclick="testWritePermission()">Run Test</button>
      <div id="write-result"></div>
    </div>

    <!-- Test 4: Read Permission -->
    <div class="test-section">
      <div class="test-title">4. Firestore Read Permission Test</div>
      <button onclick="testReadPermission()">Run Test</button>
      <div id="read-result"></div>
    </div>

    <!-- Test 5: Network Check -->
    <div class="test-section">
      <div class="test-title">5. Network & CORS Check</div>
      <button onclick="testNetwork()">Run Test</button>
      <div id="network-result"></div>
    </div>

    <!-- Run All Tests -->
    <div style="margin-top: 30px; text-align: center;">
      <button onclick="runAllTests()" style="background: #28a745; font-size: 16px; padding: 15px 30px;">
        🚀 Run All Tests
      </button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, doc, setDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
      apiKey: "AIzaSyCpx0Tj38AgzN2cnYeh6rn6p3JpWkg4aG8",
      authDomain: "kolhapuri-chappals-56bdc.firebaseapp.com",
      projectId: "kolhapuri-chappals-56bdc",
      storageBucket: "kolhapuri-chappals-56bdc.firebasestorage.app",
      messagingSenderId: "888767512643",
      appId: "1:888767512643:web:2b23cf46cf908e268714f6",
      measurementId: "G-49S6NPNGNP"
    };

    let app, db;

    window.testFirebaseConfig = function() {
      const resultDiv = document.getElementById('config-result');
      resultDiv.innerHTML = '<div class="loading"></div>';
      
      try {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        
        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Firebase initialized successfully!
            <div class="code">
              Project ID: ${firebaseConfig.projectId}<br>
              Auth Domain: ${firebaseConfig.authDomain}<br>
              Current Domain: ${window.location.hostname}
            </div>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ Firebase initialization failed!
            <div class="code">${error.message}</div>
          </div>
        `;
      }
    };

    window.testFirestoreConnection = async function() {
      const resultDiv = document.getElementById('firestore-result');
      resultDiv.innerHTML = '<div class="loading"></div>';
      
      try {
        if (!db) {
          app = initializeApp(firebaseConfig);
          db = getFirestore(app);
        }
        
        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Firestore connection established!
            <div class="code">Database: ${db.type}<br>Connected to: ${firebaseConfig.projectId}</div>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ Firestore connection failed!
            <div class="code">${error.message}</div>
          </div>
        `;
      }
    };

    window.testWritePermission = async function() {
      const resultDiv = document.getElementById('write-result');
      resultDiv.innerHTML = '<div class="loading"></div>';
      
      try {
        if (!db) {
          app = initializeApp(firebaseConfig);
          db = getFirestore(app);
        }
        
        const testDoc = {
          test: true,
          timestamp: new Date().toISOString(),
          domain: window.location.hostname
        };
        
        const docRef = await addDoc(collection(db, 'diagnostic_test'), testDoc);
        
        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Write permission granted! Test document created.
            <div class="code">Document ID: ${docRef.id}<br>Collection: diagnostic_test</div>
            <div class="result info" style="margin-top: 10px;">
              ℹ️ This means your Firestore security rules allow writes. Products should work!
            </div>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ Write permission denied!
            <div class="code">${error.message}</div>
            <div class="result warning" style="margin-top: 10px;">
              ⚠️ This is likely why products aren't being added!<br><br>
              <strong>Solution:</strong><br>
              1. Go to Firebase Console<br>
              2. Firestore Database → Rules<br>
              3. Update rules to allow writes<br>
              4. Click "Publish"
            </div>
          </div>
        `;
      }
    };

    window.testReadPermission = async function() {
      const resultDiv = document.getElementById('read-result');
      resultDiv.innerHTML = '<div class="loading"></div>';
      
      try {
        if (!db) {
          app = initializeApp(firebaseConfig);
          db = getFirestore(app);
        }
        
        const querySnapshot = await getDocs(collection(db, 'products'));
        const count = querySnapshot.size;
        
        resultDiv.innerHTML = `
          <div class="result success">
            ✅ Read permission granted! Found ${count} products.
            <div class="code">Collection: products<br>Documents: ${count}</div>
          </div>
        `;
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ Read permission denied!
            <div class="code">${error.message}</div>
          </div>
        `;
      }
    };

    window.testNetwork = async function() {
      const resultDiv = document.getElementById('network-result');
      resultDiv.innerHTML = '<div class="loading"></div>';
      
      try {
        const response = await fetch('https://firestore.googleapis.com/v1/projects/kolhapuri-chappals-56bdc/databases/(default)/documents/products');
        
        if (response.ok) {
          resultDiv.innerHTML = `
            <div class="result success">
              ✅ Network connection successful!
              <div class="code">Status: ${response.status}<br>CORS: Allowed</div>
            </div>
          `;
        } else {
          resultDiv.innerHTML = `
            <div class="result warning">
              ⚠️ Network response: ${response.status}
              <div class="code">${response.statusText}</div>
            </div>
          `;
        }
      } catch (error) {
        resultDiv.innerHTML = `
          <div class="result error">
            ❌ Network error!
            <div class="code">${error.message}</div>
            <div class="result warning" style="margin-top: 10px;">
              ⚠️ Possible CORS issue. Add your domain to Firebase authorized domains.
            </div>
          </div>
        `;
      }
    };

    window.runAllTests = async function() {
      await testFirebaseConfig();
      await new Promise(r => setTimeout(r, 500));
      await testFirestoreConnection();
      await new Promise(r => setTimeout(r, 500));
      await testReadPermission();
      await new Promise(r => setTimeout(r, 500));
      await testWritePermission();
      await new Promise(r => setTimeout(r, 500));
      await testNetwork();
    };
  </script>
</body>
</html>
